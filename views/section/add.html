<div class="panel panel-default">
    <div class="panel-heading caption-subject font-blue-dark bold uppercase">
        <span class="font-blue-dark">New Section</span>
        <span class="pull-right"><a ui-sref="sections"><span
                class="font-blue-dark">Back To Section List</span></a></span>
    </div>
    <div class="panel-body">
        <form ng-show="!success" name="form" role="form" novalidate ng-submit="save()" show-validation>
            <div class="row">
            <div class="form-group col-md-10">
                <label for="chapter">Chapter</label>
                <select id="chapter" name="chapter" class="form-control input-large"
                        ng-options="chapter.nameBangla for chapter in chapters track by chapter.serial"
                        ng-model="object.chapter" required>
                    <option value="">Select Chapter</option>
                </select>
            </div>
                <div class="form-group col-md-2" style="margin-top: 3%; margin-bottom: 0;">
                <button  type="button" ng-click="addMoreContent()" class="btn btn-success pull-right"><span class="glyphicon glyphicon-plus"></span> Add</button>
            </div>
            </div>
            <hr style="margin-top: 0;"/>
            <div class="panel panel-default " ng-repeat="section in sections">
                <button type="button" style="padding: 1px 1px" ng-if="$index !=0" ng-click="removeContent($index)" class="btn btn-danger pull-right">
                    <span class="glyphicon glyphicon-remove" aria-hidden="true"></span>
                </button>
                <div class="row panel-body" >

            <div class="form-group col-md-5">
                <label for="fullName">Name</label>
                <input type="text" class="form-control" id="fullName" name="fullName"
                       placeholder="Full Name"
                       ng-model="section.name">
            </div>
            <div class="form-group col-md-5">
                <label for="nameBangla">Bangla Name</label>
                <input type="text" class="form-control" id="nameBangla" name="fullName"
                       placeholder="Full Name"
                       ng-model="section.nameBangla">
            </div>
            <div class="form-group col-md-2">
                <label for="serial">Serial</label>
                <input type="number" id="serial" class="form-control"  name="serial" required
                       ng-model="section.serial">
            </div>

                </div>
            </div>
            <hr/>
            <div class="form-group text-center">
                <button type="submit" ng-disabled="form.$invalid" class="btn btn-primary">Save</button>
            </div>

        </form>
    </div>
</div>
