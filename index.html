<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলাদেশ সরকারের সংস্কার কমিশন</title>
  <link rel="icon" href="./favicon.ico">
  <!-- preload critical above-fold assets -->
  <link rel="preload" as="image" href="./images/july-revolution.jpg">
  <link rel="preload" as="image" href="./images/BDGov.jpg">
  <!-- preconnect to speed up CDN handshakes -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- critical CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Noto Sans Bengali via Google Fonts (fast, cached globally) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap">
  <!-- Font Awesome deferred so it doesn't block render -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
  <style>
    @font-face {
      font-family: 'ShurjoWeb';
      src: url('./font/ShurjoWeb_400.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'ShurjoWeb';
      src: url('./font/ShurjoWeb_700.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }

    :root {
      --primary:   #004080;
      --secondary: #003366;
      --accent:    #1a6bbf;
      --white:     #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans Bengali', 'ShurjoWeb', Arial, sans-serif;
      background: url('./images/body.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      margin: 0;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--primary);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .site-header img { height: 58px; object-fit: contain; }
    .site-header .site-title {
      color: white;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      flex: 1;
      line-height: 1.4;
    }

    /* ── NAV ── */
    .site-nav {
      background: var(--secondary);
      padding: 0.4rem 1rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    .site-nav ul {
      list-style: none;
      margin: 0; padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.2rem 0.5rem;
    }
    .site-nav a {
      color: #dce9ff;
      text-decoration: none;
      padding: 0.4rem 0.7rem;
      border-radius: 4px;
      font-size: 0.95rem;
      display: block;
      transition: background .2s;
    }
    .site-nav a:hover, .site-nav a.active { background: rgba(255,255,255,.18); color: white; }

    /* language toggle */
    .lang-wrap { display: flex; align-items: center; gap: 0.4rem; color: #dce9ff; font-size: 0.85rem; margin-left: 0.5rem; }
    .lang-switch { position: relative; display: inline-block; width: 46px; height: 24px; }
    .lang-switch input { opacity: 0; width: 0; height: 0; }
    .lang-slider { position: absolute; inset: 0; background: #546e8a; border-radius: 24px; cursor: pointer; transition: .3s; }
    .lang-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
    #lang-check:checked + .lang-slider { background: var(--accent); }
    #lang-check:checked + .lang-slider:before { transform: translateX(22px); }

    /* ── MAIN CONTENT ── */
    #app { padding: 1.2rem 1rem 4rem; min-height: 60vh; }

    /* ── COMMISSION CARDS ── */
    .commission-card {
      background: white;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      height: 100%;
      text-decoration: none;
    }
    .commission-card:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .commission-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: contain; padding: 4px; flex-shrink: 0; }
    .commission-card .c-name { color: var(--primary); font-weight: 700; font-size: 1rem; flex: 1; line-height: 1.4; }
    .commission-card .c-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 1.25rem; line-height: 1; flex-shrink: 0; cursor: pointer; }

    /* ── HERO ── */
    .hero-img { width: 100%; height: 380px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
    .section-heading { color: var(--primary); font-weight: 700; font-size: 1.7rem; text-align: center; margin: 1.5rem 0 1rem; }
    .speech-box {
      background: rgba(255,255,255,.93);
      border-radius: 10px;
      padding: 1.4rem 1.8rem;
      line-height: 1.9;
      font-size: 0.98rem;
      text-align: justify;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── REPORT PAGE ── */
    .sidebar-panel {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      position: sticky;
      top: 60px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .content-panel {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      min-height: 400px;
    }

    /* ── CHAPTER TREE ── */
    .tree-list { list-style: none; padding: 0; margin: 0; }
    .tree-list .tree-list { padding-left: 0.8rem; }
    .tree-item { margin-bottom: 2px; }
    .tree-label {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      padding: 0.38rem 0.6rem;
      border-left: 3px solid transparent;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      font-size: 0.88rem;
      color: #222;
      transition: background .15s, border-color .15s;
      line-height: 1.4;
    }
    .tree-label:hover { background: #eef3f9; border-left-color: #90b4d0; }
    .tree-label.active { background: #dbe9f8; border-left-color: var(--primary); color: var(--primary); font-weight: 600; }
    .tree-label .toggle-icon { font-size: 0.7rem; color: #888; flex-shrink: 0; transition: transform .2s; width: 12px; }
    .tree-label.open .toggle-icon { transform: rotate(90deg); }
    .tree-children { display: none; }
    .tree-children.open { display: block; }
    .vol-label { font-weight: 700; font-size: 0.92rem; color: var(--primary); }
    .sec-label { font-size: 0.84rem; color: #333; }

    /* ── CONTENT AREA ── */
    .content-heading { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 0.5rem; margin-bottom: 1rem; font-size: 1.1rem; }
    .paragraph-block { margin-bottom: 0.9rem; }
    .para-header { font-weight: 700; margin-bottom: 0.3rem; }
    .para-body { line-height: 1.9; font-size: 0.95rem; text-align: justify; white-space: pre-wrap; display: flex; gap: 0.4rem; }
    .para-index { min-width: 1.4rem; flex-shrink: 0; }
    .pdf-frame { width: 100%; height: 870px; border: none; border-radius: 6px; display: block; margin-top: 0.5rem; }
    .placeholder-msg { color: #999; text-align: center; padding: 3rem 1rem; }

    /* ── TABLES ── */
    .data-table th { background: var(--primary); color: white; font-weight: 600; }
    .data-table td, .data-table th { vertical-align: middle; font-size: 0.92rem; }
    .data-table a { color: var(--primary); }

    /* ── NOTICE PAGINATION ── */
    .page-btn { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 0.3rem 0.9rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .page-btn:hover { background: var(--primary); color: white; }
    .page-btn.current { background: var(--primary); color: white; }

    /* ── LOADING SPINNER ── */
    .spinner-wrap { text-align: center; padding: 3rem; color: var(--primary); }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--primary);
      color: #cce0ff;
      padding: 1.2rem 2rem;
    }
    .site-footer a { color: #cce0ff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .site-header { padding: 0.6rem 1rem; }
      .site-header .site-title { font-size: 1rem; }
      .hero-img { height: 220px; }
      .section-heading { font-size: 1.2rem; }
      .sidebar-panel { position: static; max-height: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <img src="./images/BDGov.jpg" alt="Bangladesh Government">
  <div class="site-title">বাংলাদেশ সরকারের সংস্কার কমিশন</div>
  <img src="./images/a2i-ict-logo.png" alt="ICT Division">
</header>

<!-- NAV -->
<nav class="site-nav">
  <ul>
    <li><a href="#/" id="nav-home"><i class="fas fa-home"></i></a></li>
    <li><a href="#/" id="nav-commission" data-key="menu.commissionReport">কমিশনের প্রতিবেদন</a></li>

    <li><a href="#/gallery" id="nav-gallery" data-key="menu.gallery">গ্যালারি</a></li>
    <li><a href="#/notice" id="nav-notice" data-key="menu.notice">নোটিশ</a></li>
    <li><a href="https://chatgpt.com/g/g-6838b22be7c08191b29f1c8bfccc0bd3-snskaar-kmishn-prtibedn-shaayikaa" target="_blank" data-key="menu.question">আপনার জিজ্ঞাসা</a></li>
    <li>
      <div class="lang-wrap">
        <span>বাংলা</span>
        <label class="lang-switch">
          <input type="checkbox" id="lang-check" onchange="App.toggleLang()">
          <span class="lang-slider"></span>

  </ul>
</nav>

<!-- MAIN -->
<main id="app">
  <div class="spinner-wrap"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div></div>
    <div class="text-center" id="footer-text">
      কপিরাইট &copy; সমস্ত অধিকার সংরক্ষিত, প্রধান উপদেষ্টার কার্যালয় <span id="footer-year"></span>
    </div>
    <div class="text-end">
      <div style="font-size:0.78rem; margin-bottom:3px;">কারিগরি সহযোগিতায়</div>
      <img src="./images/a2i-ict-logo.png" width="88" alt="ICT">
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="./js/site.js" defer></script>
</body>
</html>
